name: Weekly Paper Digest

on:
  schedule:
    # 每周一 09:00 CST（北京时间）= 周一 01:00 UTC
    - cron: '0 1 * * 1'
  # 允许手动在 GitHub Actions 界面触发，方便测试
  workflow_dispatch:

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许提交 seen_ids.json

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行论文抓取脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python main.py

      - name: 提交更新后的 seen_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json papers/
          # 只在文件有变化时提交
          git diff --staged --quiet || git commit -m "papers: weekly digest [$(date +'%Y-%m-%d')]"
          git push
